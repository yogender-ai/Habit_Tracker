services:
  - type: web
    name: dayforge-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_TIMEZONE
        value: Asia/Kolkata
      - key: ALLOW_DEV_AUTH
        value: false
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL_PRIMARY
        sync: false
      - key: DATABASE_URL_SECONDARY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
