services:
  - type: web
    name: dayforge-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: APP_TIMEZONE
        value: Asia/Kolkata
      - key: ALLOW_DEV_AUTH
        value: false
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL_PRIMARY
        sync: false
      - key: DATABASE_URL_SECONDARY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_REPLY_TO
        sync: false
      - key: NOTIFICATION_CRON_SECRET
        sync: false

# Cron job to send reminder emails every 15 minutes
# Render cron jobs are paid-only. For free tier, use external cron:
# - cron-job.org (free) → POST https://dayforge-api.onrender.com/api/notifications/due
#   with header: x-cron-secret: <your NOTIFICATION_CRON_SECRET value>
#   schedule: */15 * * * *
